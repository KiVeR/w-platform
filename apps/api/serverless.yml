service: platform-api

provider:
    name: aws
    region: eu-west-3
    architecture: arm64
    httpApi:
        cors:
            allowedOrigins:
                - https://dashboard.wellpack.fr
                - https://*.wellpack-platform.pages.dev
            allowedHeaders:
                - Content-Type
                - Authorization
            allowedMethods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
    environment:
        APP_ENV: production
        DB_CONNECTION: pgsql
        QUEUE_CONNECTION: sqs
        CACHE_STORE: array
        FILESYSTEM_DISK: s3
        SESSION_DRIVER: array
        LOG_CHANNEL: stderr
        DB_SSLMODE: require
        DB_URL: ${ssm:/wellpack/prod/DATABASE_URL}
        DATABASE_URL_UNPOOLED: ${ssm:/wellpack/prod/DATABASE_URL_UNPOOLED}
        APP_KEY: ${ssm:/wellpack/prod/APP_KEY}
        DB_PASSWORD: ${ssm:/wellpack/prod/DB_PASSWORD}
        GOOGLE_CLIENT_SECRET: ${ssm:/wellpack/prod/GOOGLE_CLIENT_SECRET}
        WEPAK_API_KEY: ${ssm:/wellpack/prod/WEPAK_API_KEY}
        SINCH_API_TOKEN: ${ssm:/wellpack/prod/SINCH_API_TOKEN}
        INFOBIP_API_KEY: ${ssm:/wellpack/prod/INFOBIP_API_KEY}
        HIGHCONNEXION_API_KEY: ${ssm:/wellpack/prod/HIGHCONNEXION_API_KEY}
        PASSPORT_PRIVATE_KEY: ${ssm:/wellpack/prod/PASSPORT_PRIVATE_KEY}
        PASSPORT_PUBLIC_KEY: ${ssm:/wellpack/prod/PASSPORT_PUBLIC_KEY}
        SENTRY_DSN: ${ssm:/wellpack/prod/SENTRY_DSN}
        MAIL_PASSWORD: ${ssm:/wellpack/prod/MAIL_PASSWORD}
    iamRoleStatements:
        - Effect: Allow
          Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
          Resource:
              - !GetAtt DefaultQueue.Arn
              - !GetAtt CampaignQueue.Arn
        - Effect: Allow
          Action:
              - s3:GetObject
              - s3:PutObject
          Resource:
              - arn:aws:s3:::${self:service}-storage/*
        - Effect: Allow
          Action:
              - ssm:GetParameter
              - ssm:GetParametersByPath
          Resource:
              - arn:aws:ssm:eu-west-3:*:parameter/wellpack/*
        - Effect: Allow
          Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
          Resource:
              - arn:aws:logs:eu-west-3:*:*

functions:
    web:
        handler: public/index.php
        runtime: php-84-fpm
        memorySize: 1024
        timeout: 28
        events:
            - httpApi: '*'

    artisan:
        handler: artisan
        runtime: php-84-console
        memorySize: 512
        timeout: 720
        events:
            - schedule:
                rate: rate(1 minute)
                input: '"schedule:run"'

    worker:
        handler: Bref\LaravelBridge\Queue\QueueHandler
        runtime: php-84
        memorySize: 1024
        timeout: 900
        reservedConcurrency: 30
        events:
            - sqs:
                arn: !GetAtt DefaultQueue.Arn
                batchSize: 1
                maximumConcurrency: 20

    campaignWorker:
        handler: Bref\LaravelBridge\Queue\QueueHandler
        runtime: php-84
        memorySize: 1024
        timeout: 900
        reservedConcurrency: 10
        events:
            - sqs:
                arn: !GetAtt CampaignQueue.Arn
                batchSize: 1
                maximumConcurrency: 5

resources:
    Resources:
        DefaultQueue:
            Type: AWS::SQS::Queue
            Properties:
                QueueName: ${self:service}-default
                VisibilityTimeout: 960
        CampaignQueue:
            Type: AWS::SQS::Queue
            Properties:
                QueueName: ${self:service}-campaigns
                VisibilityTimeout: 960

plugins:
    - ./vendor/bref/bref
