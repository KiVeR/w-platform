# Infrastructure-only env vars (Docker hostnames, ports).
# App-specific vars (drivers, API keys, OAuth) live in apps/api/.env
# and are read directly by Laravel via the mounted volume.
name: "wellpack-${PORT_PREFIX:-80}"

x-api-env: &api-env
  APP_NAME: Wellpack
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: http://localhost:${PORT_PREFIX:-80}00
  FRONTEND_URL: http://localhost:${PORT_PREFIX:-80}01
  KREO_URL: http://localhost:${PORT_PREFIX:-80}02
  LOG_CHANNEL: stderr
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${POSTGRES_DB:-platform-api}
  DB_USERNAME: ${POSTGRES_USER:-wellpack}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
  AUTH_GUARD: api
  SESSION_DRIVER: array
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  MAIL_FROM_ADDRESS: hello@wellpack.fr
  MAIL_FROM_NAME: Wellpack

x-api-volumes: &api-volumes
  - ./apps/api:/var/www/html
  - api_vendor:/var/www/html/vendor
  - ${SDK_PATH:-../../sdk}:/sdk

x-workspace-volumes: &workspace-volumes
  - .:/app
  - workspace_node_modules:/app/node_modules
  - pnpm_store:/pnpm/store

x-dashboard-env: &dashboard-env
  NUXT_PUBLIC_API_URL: http://localhost:${PORT_PREFIX:-80}00
  NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}
  NUXT_PUBLIC_PUSHER_ENABLED: ${NUXT_PUBLIC_PUSHER_ENABLED:-false}
  NUXT_PUBLIC_PUSHER_APP_KEY: ${NUXT_PUBLIC_PUSHER_APP_KEY:-}
  NUXT_PUBLIC_PUSHER_CLUSTER: ${NUXT_PUBLIC_PUSHER_CLUSTER:-eu}
  NUXT_PUBLIC_PUSHER_HOST: ${NUXT_PUBLIC_PUSHER_HOST:-}
  NUXT_PUBLIC_PUSHER_PORT: ${NUXT_PUBLIC_PUSHER_PORT:-443}
  NUXT_PUBLIC_PUSHER_SCHEME: ${NUXT_PUBLIC_PUSHER_SCHEME:-https}
  NUXT_PUBLIC_PUSHER_LOG_TO_CONSOLE: ${NUXT_PUBLIC_PUSHER_LOG_TO_CONSOLE:-false}

x-kreo-env: &kreo-env
  NUXT_PUBLIC_PLATFORM_API_URL: http://api:8000
  KREO_PORT: 3000

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: dev
    volumes: *api-volumes
    environment:
      <<: *api-env
    ports:
      - "${PORT_PREFIX:-80}00:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  horizon:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: dev
    volumes: *api-volumes
    environment:
      <<: *api-env
    command: php artisan horizon
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: dev
    volumes: *api-volumes
    environment:
      <<: *api-env
    command: php artisan schedule:work
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:17-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wellpack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-platform-api}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "${PORT_PREFIX:-80}32:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wellpack}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    ports:
      - "${PORT_PREFIX:-80}79:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${PORT_PREFIX:-80}25:8025"

  bref-web:
    image: bref/php-84-dev:3
    environment:
      <<: *api-env
      BREF_RUNTIME: fpm
      HANDLER: public/index.php
      DOCUMENT_ROOT: public
      CACHE_STORE: array
      QUEUE_CONNECTION: sqs
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-west-3
      SQS_PREFIX: http://elasticmq:9324/000000000000
      SQS_QUEUE: default
      CAMPAIGN_SENDING_DRIVER: stub
      CAMPAIGN_STATS_DRIVER: stub
    volumes: *api-volumes
    ports:
      - "${PORT_PREFIX:-80}08:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_started
    profiles:
      - bref

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    volumes:
      - ./docker/elasticmq/elasticmq.conf:/opt/elasticmq.conf
    ports:
      - "${PORT_PREFIX:-80}24:9324"
    profiles:
      - bref

  dashboard-preview:
    image: nginx:alpine
    volumes:
      - ./apps/dashboard/.output/public:/usr/share/nginx/html:ro
      - ./docker/nginx/spa.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PORT_PREFIX:-80}02:80"
    profiles:
      - bref

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
      target: prod
    environment:
      <<: *dashboard-env
    ports:
      - "${PORT_PREFIX:-80}01:3000"
    depends_on:
      api:
        condition: service_healthy

  dashboard-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
      target: dev
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - dashboard_app_node_modules:/app/apps/dashboard/node_modules
    working_dir: /app
    environment:
      <<: *dashboard-env
    ports:
      - "${PORT_PREFIX:-80}01:3000"
    depends_on:
      api:
        condition: service_healthy

  kreo:
    build:
      context: .
      dockerfile: docker/kreo/Dockerfile
      target: prod
    environment:
      <<: *kreo-env
    ports:
      - "${PORT_PREFIX:-80}02:3000"
    depends_on:
      api:
        condition: service_healthy

  kreo-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/kreo/Dockerfile
      target: dev
    volumes:
      - .:/app
      - workspace_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
      - kreo_app_node_modules:/app/apps/kreo/node_modules
    working_dir: /app
    environment:
      <<: *kreo-env
    ports:
      - "${PORT_PREFIX:-80}02:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  api_vendor:
  workspace_node_modules:
  pnpm_store:
  dashboard_app_node_modules:
  kreo_app_node_modules:
