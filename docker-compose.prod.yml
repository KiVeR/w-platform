# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      target: prod
    volumes: []  # Pas de bind mounts en prod — code baked in image
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      SESSION_DRIVER: array
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  horizon:
    build:
      target: prod
    volumes: []
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  scheduler:
    build:
      target: prod
    volumes: []
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
    restart: always

  dashboard:
    build:
      target: prod
    volumes: []
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    restart: always
    ports: []  # Pas de port exposé en prod

  redis:
    restart: always
    ports: []  # Pas de port exposé en prod

  mailpit:
    profiles:
      - debug  # Mailpit non démarré en prod sauf si profile debug activé
