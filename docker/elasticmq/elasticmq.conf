include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  default {
    defaultVisibilityTimeout = 960 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
  campaigns {
    defaultVisibilityTimeout = 960 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
}

aws {
  region = eu-west-3
  accountId = 000000000000
}
